<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>活动打卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
      min-height: 100vh;
    }
    
    .page {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .page.active { display: flex; }
    
    .title { color: white; font-size: 28px; font-weight: bold; margin-bottom: 40px; }
    
    .input-group { width: 100%; max-width: 300px; margin-bottom: 30px; }
    .input-group input {
      width: 100%; padding: 15px 20px; font-size: 18px;
      border: none; border-radius: 25px; outline: none;
    }
    
    .btn {
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      color: #56ab2f; background: #ffffff; border: 2px solid #56ab2f;
      border-radius: 25px; cursor: pointer;
    }
    
    .btn-group { display: flex; gap: 15px; }
    #photoInput { display: none; }
    
    /* 海报容器 */
    .poster {
      width: 270px;
      height: 480px;
      position: relative;
      margin-bottom: 30px;
    }
    
    /* 相框背景 */
    .poster-bg {
      width: 270px;
      height: 480px;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 10px;
    }
    
    /* 用户照片 - 覆盖在白色区域 */
    .user-photo {
      position: absolute;
      top: 65px;
      left: 25px;
      width: 220px;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
    }
    
    /* 姓名 */
    .name {
      position: absolute;
      top: 380px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>
<body>
  <!-- 第1页 -->
  <div id="page1" class="page active">
    <h1 class="title">活动打卡</h1>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="请输入您的姓名" maxlength="20">
    </div>
    <button class="btn" onclick="goToPage2()">打卡</button>
  </div>
  
  <!-- 第2页 -->
  <div id="page2" class="page">
    <div class="poster">
      <!-- 用户照片在下层，相框在上层 -->
      <img id="photo2" class="user-photo" src="" style="display:none;">
      <img class="poster-bg" src="frame.png" alt="相框">
      <div id="name2" class="name"></div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="document.getElementById('photoInput').click()">上传照片</button>
      <button class="btn" onclick="goToPage3()">生成海报</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
  </div>
  
  <!-- 第3页 -->
  <div id="page3" class="page">
    <div class="poster">
      <!-- 用户照片在下层，相框在上层 -->
      <img id="photo3" class="user-photo" src="" style="display:none;">
      <img class="poster-bg" src="frame.png" alt="相框">
      <div id="name3" class="name"></div>
    </div>
    <button class="btn" onclick="savePoster()">保存海报</button>
  </div>
  
  <script>
    let userName = '';
    let userPhotoData = null;
    
    function goToPage2() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert('请输入姓名');
      userName = name;
      document.getElementById('name2').textContent = userName;
      showPage(2);
    }
    
    function goToPage3() {
      if (!userPhotoData) return alert('请先上传照片');
      document.getElementById('photo3').src = userPhotoData;
      document.getElementById('photo3').style.display = 'block';
      document.getElementById('name3').textContent = userName;
      showPage(3);
    }
    
    function showPage(n) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + n).classList.add('active');
    }
    
    function handlePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        userPhotoData = evt.target.result;
        document.getElementById('photo2').src = userPhotoData;
        document.getElementById('photo2').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    
    function savePoster() {
      // 用html2canvas或者直接用dataURL合成
      const poster = document.querySelector('#page3 .poster');
      
      // 创建一个canvas
      const canvas = document.createElement('canvas');
      canvas.width = 270;
      canvas.height = 480;
      const ctx = canvas.getContext('2d');
      
      // 先画用户照片（在下层）
      const userImg = new Image();
      userImg.crossOrigin = 'anonymous';
      userImg.src = userPhotoData;
      
      userImg.onload = function() {
        // 裁剪照片适应区域
        const x = 25, y = 65, w = 220, h = 300;
        const imgRatio = userImg.width / userImg.height;
        const targetRatio = w / h;
        let sx, sy, sw, sh;
        
        if (imgRatio > targetRatio) {
          sh = userImg.height;
          sw = sh * targetRatio;
          sy = 0;
          sx = (userImg.width - sw) / 2;
        } else {
          sw = userImg.width;
          sh = sw / targetRatio;
          sx = 0;
          sy = (userImg.height - sh) / 2;
        }
        
        ctx.drawImage(userImg, sx, sy, sw, sh, x, y, w, h);
        
        // 再画相框（在上层）
        const frameImg = new Image();
        frameImg.crossOrigin = 'anonymous';
        frameImg.src = 'frame.png';
        
        frameImg.onload = function() {
          ctx.drawImage(frameImg, 0, 0, 270, 480);
          
          // 画姓名
          ctx.fillStyle = 'black';
          ctx.font = 'bold 20px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(userName, 135, 410);
          
          // 下载
          const link = document.createElement('a');
          link.download = formatDate() + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          alert('海报已保存');
        };
      };
    }
    
    function formatDate() {
      const d = new Date();
      return d.getFullYear() +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0') +
        String(d.getSeconds()).padStart(2,'0');
    }
  </script>
</body>
</html>
