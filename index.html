<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>出征海报</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
      min-height: 100vh;
    }
    
    .page {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .page.active { display: flex; }
    
    .title { color: white; font-size: 28px; font-weight: bold; margin-bottom: 40px; }
    .season-title { color: white; font-size: 36px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    
    .input-group { width: 100%; max-width: 300px; margin-bottom: 30px; }
    .input-group input {
      width: 100%; padding: 15px 20px; font-size: 18px;
      border: none; border-radius: 25px; outline: none;
    }
    
    .btn {
      padding: 15px 30px; font-size: 18px; font-weight: bold;
      color: #56ab2f; background: #ffffff; border: 2px solid #56ab2f;
      border-radius: 25px; cursor: pointer;
    }
    
    .btn-group { display: flex; gap: 15px; }
    #photoInput { display: none; }
    
    /* 海报容器 */
    .poster {
      width: 270px;
      height: 480px;
      position: relative;
      margin-bottom: 30px;
    }
    
    /* 相框背景 */
    .poster-bg {
      width: 270px;
      height: 480px;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 10px;
      z-index: 10; /* 相框在最上层 */
    }
    
    /* 用户照片 - 覆盖在白色区域 */
    .user-photo {
      position: absolute;
      top: 105px;
      left: 25px;
      width: 220px;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
      z-index: 1; /* 用户照片在下层 */
    }
    
    /* 姓名 */
    .name {
      position: absolute;
      top: 86px;
      left: 43px;
      right: 0;
      text-align: left;
      font-size: 14px;
      font-weight: bold;
      color: black;
      z-index: 11;
    }
    .save-tip {
      color: white;
      font-size: 16px;
      margin-top: 20px;
    }
    
    #poster-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 50vh;
    }
    
    /* 隐藏 Vercel 提示 */
    .vercel-footer, .footer, [class*="vercel"], [class*="Vercel"] {
      display: none !important;
    }
    
    /* 提示信息样式 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 25px 50px;
      border-radius: 15px;
      font-size: 24px;
      font-weight: bold;
      z-index: 9999;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- 第1页 -->
  <div id="page1" class="page active">
    <div class="season-title">春醒时·野新生</div>
    <h1 class="title">出征海报</h1>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="请输入您的姓名" maxlength="20">
    </div>
    <button class="btn" onclick="goToPage2()">制作海报</button>
  </div>
  
  <!-- 第2页 -->
  <div id="page2" class="page">
    <div class="poster">
      <!-- 用户照片在下层，相框在上层 -->
      <img id="photo2" class="user-photo" src="" style="display:none;">
      <img class="poster-bg" src="frame.png" alt="相框">
      <div id="name2" class="name"></div>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="document.getElementById('photoInput').click()">上传照片</button>
      <button class="btn" onclick="goToPage3()">生成海报</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
  </div>
  
  <!-- 第3页 -->
  <div id="page3" class="page">
    <div id="poster-container"></div>
    <p class="save-tip">长按图片保存</p>
  </div>
  
  <script>
    let userName = '';
    let userPhotoData = null;
    
    function goToPage2() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) return alert('请输入姓名');
      userName = name;
      document.getElementById('name2').textContent = userName;
      showPage(2);
    }
    
    function goToPage3() {
      if (!userPhotoData) return alert('请先上传照片');
      
      showPage(3);
      
      const posterContainer = document.getElementById('poster-container');
      posterContainer.innerHTML = '<p style="color:white;">海报生成中...</p>';
      
      // 创建canvas生成海报
      const frameImg = new Image();
      frameImg.crossOrigin = 'anonymous';
      frameImg.src = 'frame.png';
      
      frameImg.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = frameImg.width;
        canvas.height = frameImg.height;
        const ctx = canvas.getContext('2d');
        
        // 先画用户照片
        const userImg = new Image();
        userImg.crossOrigin = 'anonymous';
        userImg.src = userPhotoData;
        
        userImg.onload = function() {
          // 照片等比例放大
          const photoX = 10 * (canvas.width / 270);
          const photoY = 85 * (canvas.height / 480);
          const photoW = 250 * (canvas.width / 270);
          const photoH = 340 * (canvas.height / 480);
          
          const imgRatio = userImg.width / userImg.height;
          const targetRatio = photoW / photoH;
          let sx, sy, sw, sh;
          
          if (imgRatio > targetRatio) {
            sh = userImg.height;
            sw = sh * targetRatio;
            sy = 0;
            sx = (userImg.width - sw) / 2;
          } else {
            sw = userImg.width;
            sh = sw / targetRatio;
            sx = 0;
            sy = (userImg.height - sh) / 2;
          }
          
          ctx.drawImage(userImg, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
          
          // 画相框
          ctx.drawImage(frameImg, 0, 0);
          
          // 画姓名 - 调整位置，字号改小
          const nameY = (80 + 30 - 10 + 2) * (canvas.height / 480);
          ctx.fillStyle = 'black';
          ctx.font = 'bold ' + (16 * canvas.width / 270) + 'px sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText(userName, 60 + 10 * (canvas.width / 270), nameY);
          
          // 显示图片
          const dataUrl = canvas.toDataURL('image/png');
          posterContainer.innerHTML = '';
          const img = document.createElement('img');
          img.src = dataUrl;
          img.style.cssText = 'max-width:90%;max-height:70vh;border-radius:10px;';
          posterContainer.appendChild(img);
        };
      };
    }
    
    function showPage(n) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + n).classList.add('active');
    }
    
    function handlePhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        userPhotoData = evt.target.result;
        document.getElementById('photo2').src = userPhotoData;
        document.getElementById('photo2').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    
    function savePoster() {
      // 直接用 canvas 绘制，尺寸跟随相框图片
      const frameImg = new Image();
      frameImg.crossOrigin = 'anonymous';
      frameImg.src = 'frame.png';
      
      frameImg.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = frameImg.width;
        canvas.height = frameImg.height;
        const ctx = canvas.getContext('2d');
        
        // 先绘制用户照片（在下层）
        if (userPhotoData) {
          const userImg = new Image();
          userImg.crossOrigin = 'anonymous';
          userImg.src = userPhotoData;
          
          userImg.onload = function() {
            // 照片等比例放大
            const photoX = 10 * (frameImg.width / 270);
            const photoY = 85 * (frameImg.height / 480);
            const photoW = 250 * (frameImg.width / 270);
            const photoH = 340 * (frameImg.height / 480);
            
            // 裁剪照片
            const imgRatio = userImg.width / userImg.height;
            const targetRatio = photoW / photoH;
            let sx, sy, sw, sh;
            
            if (imgRatio > targetRatio) {
              sh = userImg.height;
              sw = sh * targetRatio;
              sy = 0;
              sx = (userImg.width - sw) / 2;
            } else {
              sw = userImg.width;
              sh = sw / targetRatio;
              sx = 0;
              sy = (userImg.height - sh) / 2;
            }
            
            ctx.drawImage(userImg, sx, sy, sw, sh, photoX, photoY, photoW, photoH);
            
            // 最后绘制相框（在上层）
            ctx.drawImage(frameImg, 0, 0);
            
            // 绘制姓名 - 调整位置，字号改小
            const nameY = (80 + 30 - 10 + 2) * (frameImg.height / 480);
            ctx.fillStyle = 'black';
            ctx.font = 'bold ' + (16 * frameImg.width / 270) + 'px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(userName, 60 + 10 * (frameImg.width / 270), nameY);
            
            saveToAlbum(canvas);
          };
          
          userImg.onerror = function() {
            alert('照片加载失败');
          };
        } else {
          // 没有照片时只绘制相框
          ctx.drawImage(frameImg, 0, 0);
          
          const nameY = (80 + 30 - 10 + 2) * (frameImg.height / 480);
          ctx.fillStyle = 'black';
          ctx.font = 'bold ' + (16 * frameImg.width / 270) + 'px sans-serif';
          ctx.textAlign = 'left';
          ctx.fillText(userName, 60 + 10 * (frameImg.width / 270), nameY);
          
          saveToAlbum(canvas);
        }
      };
      
      frameImg.onerror = function() {
        alert('相框加载失败');
      };
    }
    
    function saveToAlbum(canvas) {
      // 转换为base64图片
      const dataUrl = canvas.toDataURL('image/png');
      const base64Data = dataUrl.replace(/^data:image\/png;base64,/, '');
      
      // 检查是否在微信浏览器中
      const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
      
      if (isWeChat) {
        // 微信浏览器中尝试使用JS-SDK保存
        // 先显示加载提示
        const toast = document.createElement('div');
        toast.textContent = '正在保存...';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:25px 50px;border-radius:15px;font-size:24px;font-weight:bold;z-index:9999;';
        document.body.appendChild(toast);
        
        // 获取微信签名
        fetch('/api/signature?url=' + encodeURIComponent(window.location.href.split('#')[0]))
          .then(res => res.json())
          .then(config => {
            // 加载微信JS-SDK
            const script = document.createElement('script');
            script.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
            script.onload = function() {
              wx.config({
                appId: config.appId,
                timestamp: config.timestamp,
                nonceStr: config.nonceStr,
                signature: config.signature,
                jsApiList: ['saveImageToPhotosAlbum']
              });
              
              wx.ready(function() {
                wx.saveImageToPhotosAlbum({
                  fileData: base64Data,
                  success: function() {
                    toast.textContent = '保存成功';
                    setTimeout(() => toast.remove(), 1000);
                  },
                  fail: function(err) {
                    console.log('微信保存失败:', err);
                    // 微信保存失败，使用备用方案
                    showImageAndSave(dataUrl, toast);
                  }
                });
              });
              
              wx.error(function(err) {
                console.log('微信配置失败:', err);
                showImageAndSave(dataUrl, toast);
              });
            };
            script.onerror = function() {
              showImageAndSave(dataUrl, toast);
            };
            document.head.appendChild(script);
          })
          .catch(function(err) {
            console.log('获取签名失败:', err);
            showImageAndSave(dataUrl, toast);
          });
      } else if (/Mobi|Android/i.test(navigator.userAgent)) {
        // 其他移动端浏览器
        try {
          const link = document.createElement('a');
          link.download = 'poster.png';
          link.href = dataUrl;
          link.click();
          
          const toast = document.createElement('div');
          toast.textContent = '保存成功';
          toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:25px 50px;border-radius:15px;font-size:24px;font-weight:bold;z-index:9999;';
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 1000);
        } catch(e) {
          console.log('保存尝试:', e);
        }
      } else {
        // PC端直接下载
        const link = document.createElement('a');
        link.download = formatDate() + '.png';
        link.href = dataUrl;
        link.click();
        
        const toast = document.createElement('div');
        toast.textContent = '保存成功';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:white;padding:25px 50px;border-radius:15px;font-size:24px;font-weight:bold;z-index:9999;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1000);
      }
    }
    
    // 备用方案：显示图片让用户长按保存
    function showImageAndSave(dataUrl, toast) {
      toast.textContent = '请长按图片保存到相册';
      
      const img = document.createElement('img');
      img.src = dataUrl;
      img.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:90%;max-height:80%;z-index:10000;border-radius:10px;';
      img.onclick = function() { document.body.removeChild(img); };
      document.body.appendChild(img);
      
      // 3秒后改为保存成功提示
      setTimeout(function() {
        toast.textContent = '保存成功';
        toast.onclick = function() { toast.remove(); };
        setTimeout(() => toast.remove(), 2000);
      }, 3000);
    }
    
    function formatDate() {
      const d = new Date();
      return d.getFullYear() +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0') +
        String(d.getSeconds()).padStart(2,'0');
    }
  </script>
</body>
</html>
