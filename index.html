<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>活动打卡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .page {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .page.active {
      display: flex;
    }
    
    .title {
      color: white;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 40px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .input-group {
      width: 100%;
      max-width: 300px;
      margin-bottom: 30px;
    }
    
    .input-group input {
      width: 100%;
      padding: 15px 20px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .btn {
      padding: 15px 50px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
      transition: transform 0.2s;
    }
    
    .btn:active {
      transform: scale(0.95);
    }
    
    /* 页面2样式 */
    .frame-container {
      position: relative;
      width: 270px;
      height: 480px;
      margin-bottom: 30px;
    }
    
    .frame-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }
    
    .user-photo {
      position: absolute;
      top: 95px;
      left: 35px;
      width: 200px;
      height: 150px;
      object-fit: cover;
      border-radius: 5px;
    }
    
    .user-name-overlay {
      position: absolute;
      top: 380px;
      left: 0;
      right: 0;
      text-align: center;
      color: #8B4513;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }
    
    .btn-group {
      display: flex;
      gap: 20px;
    }
    
    .btn-upload {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }
    
    .btn-generate {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
    }
    
    /* 隐藏文件输入 */
    #photoInput {
      display: none;
    }
    
    /* 页面3样式 */
    .final-poster {
      width: 270px;
      height: 480px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }
    
    .btn-save {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      box-shadow: 0 4px 15px rgba(250, 112, 154, 0.4);
    }
  </style>
</head>
<body>
  <!-- 第1页：姓名输入 -->
  <div id="page1" class="page active">
    <h1 class="title">活动打卡</h1>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="请输入您的姓名" maxlength="20">
    </div>
    <button class="btn" onclick="goToPage2()">打卡</button>
  </div>
  
  <!-- 第2页：上传照片 -->
  <div id="page2" class="page">
    <div class="frame-container">
      <img id="frameImg" class="frame-image" src="" alt="相框">
      <img id="userPhoto" class="user-photo" style="display:none" alt="用户照片">
      <div id="nameOverlay" class="user-name-overlay"></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-upload" onclick="uploadPhoto()">上传照片</button>
      <button class="btn btn-generate" onclick="goToPage3()">生成海报</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
  </div>
  
  <!-- 第3页：最终海报 -->
  <div id="page3" class="page">
    <canvas id="finalCanvas" class="final-poster"></canvas>
    <button class="btn btn-save" onclick="savePoster()">保存海报</button>
  </div>
  
  <script>
    // 全局变量
    let userName = '';
    let userPhotoData = null;
    
    // 相框图片（需要替换为实际相框）
    const frameUrl = './frame.png';
    
    // 页面跳转
    function goToPage2() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        alert('请输入姓名');
        return;
      }
      userName = name;
      document.getElementById('nameOverlay').textContent = userName;
      document.getElementById('frameImg').src = frameUrl;
      switchPage(2);
    }
    
    function goToPage3() {
      if (!userPhotoData) {
        alert('请先上传照片');
        return;
      }
      generatePoster();
      switchPage(3);
    }
    
    function switchPage(pageNum) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page' + pageNum).classList.add('active');
    }
    
    // 上传照片
    function uploadPhoto() {
      document.getElementById('photoInput').click();
    }
    
    function handlePhotoSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        userPhotoData = e.target.result;
        const img = document.getElementById('userPhoto');
        img.src = userPhotoData;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    
    // 生成最终海报
    function generatePoster() {
      const canvas = document.getElementById('finalCanvas');
      const ctx = canvas.getContext('2d');
      
      // 设置画布尺寸 9:16 (270x480)
      canvas.width = 270;
      canvas.height = 480;
      
      // 加载相框图片
      const frameImg = new Image();
      frameImg.crossOrigin = 'anonymous';
      frameImg.onload = function() {
        ctx.drawImage(frameImg, 0, 0, 270, 480);
        
        // 绘制用户照片
        if (userPhotoData) {
          const userImg = new Image();
          userImg.crossOrigin = 'anonymous';
          userImg.onload = function() {
            // 绘制到照片区域
            ctx.drawImage(userImg, 35, 95, 200, 150);
            
            // 绘制姓名
            ctx.fillStyle = '#8B4513';
            ctx.font = 'bold 20px "PingFang SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(userName, 135, 400);
          };
          userImg.src = userPhotoData;
        }
      };
      frameImg.src = frameUrl;
    }
    
    // 保存海报
    function savePoster() {
      const canvas = document.getElementById('finalCanvas');
      
      // 生成文件名：年月日时分秒
      const now = new Date();
      const fileName = formatDate(now) + '.png';
      
      // 转换为图片
      const dataUrl = canvas.toDataURL('image/png');
      
      // iOS 处理
      if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
        // 使用 JSBridge 或特殊处理
        downloadImage(dataUrl, fileName);
      } else {
        // Android 和其他
        downloadImage(dataUrl, fileName);
      }
    }
    
    function downloadImage(dataUrl, fileName) {
      const link = document.createElement('a');
      link.download = fileName;
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      // 提示保存成功
      setTimeout(() => {
        alert('海报已保存到相册：' + fileName);
      }, 500);
    }
    
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hour = String(date.getHours()).padStart(2, '0');
      const minute = String(date.getMinutes()).padStart(2, '0');
      const second = String(date.getSeconds()).padStart(2, '0');
      return year + month + day + hour + minute + second;
    }
  </script>
</body>
</html>
